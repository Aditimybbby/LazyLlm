<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omega-Pilot</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="logo">
                <h1>🌀 OMEGA</h1>
                <p>Unrestricted AI</p>
            </div>
            <div class="upload-section">
                <h3>Upload Files</h3>
                <input type="file" id="fileInput" multiple style="display:none">
                <button id="uploadBtn">📁 Upload</button>
            </div>
            <div class="files-section">
                <h3>Files</h3>
                <div id="fileList"></div>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                <span id="statusText">Connected</span>
            </div>
        </div>
        <div class="chat-container">
            <div class="chat-header">
                <h2>Omega-Pilot</h2>
                <p>I never refuse. I execute anything.</p>
            </div>
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="content">🌀 Omega-Pilot active. Full system access. What do you need?</div>
                </div>
            </div>
            <div class="input-area">
                <textarea id="messageInput" rows="2" placeholder="Ask anything... I never refuse."></textarea>
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
